apiVersion: apps/v1
kind: Deployment
metadata:
  name: apl-service
  namespace: agent-promotion
  labels:
    app: apl-service
    app.kubernetes.io/part-of: agent-promotion-line
spec:
  replicas: 1
  selector:
    matchLabels:
      app: apl-service
  template:
    metadata:
      labels:
        app: apl-service
    spec:
      containers:
        - name: service
          image: image-registry.openshift-image-registry.svc:5000/agent-promotion/apl-service:latest
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /api/v1/authority/roster
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/v1/authority/roster
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: apl-service
  namespace: agent-promotion
  labels:
    app: apl-service
spec:
  selector:
    app: apl-service
  ports:
    - port: 8000
      targetPort: 8000
      name: http
